<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Lumen Run</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="game-shell">
    <div class="game-frame">
      <canvas id="game" aria-label="Lumen Run game"></canvas>
      <div class="scanlines" aria-hidden="true"></div>
    </div>
    <p class="hint">ARROW KEYS / A D to move · SPACE / W / ↑ to jump · P / ESC to pause</p>
  </main>
  <script src="game.js"></script>
</body>
</html>
